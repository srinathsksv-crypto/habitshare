<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Micro-interaction: Subtle parallax on glow
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            
            const glow = document.querySelector('.glow-effect');
            if(glow) glow.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
            
            const bottomGlow = document.querySelector('.bottom-glow');
            if(bottomGlow) bottomGlow.style.transform = `translate(${-x * 30}px, ${-y * 30}px)`;
        });
    </script>
